<!DOCTYPE html>
<html>

<head>
<title>IAS Practice MCQ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>History MCQ Practice</h1>

<div id="quiz"></div>

<button onclick="nextQuestion()">Next</button>
<button onclick="finishTest()">Finish Test</button>

<h2 id="score"></h2>

<div id="review"></div>


<script src="questions.js"></script>

<script>

let current = 0;
let answers = [];


function loadQuestion(){

let q = questions[current];

let html =
"<h2>"+(current+1)+". "+q.question+"</h2>";


q.options.forEach((opt,i)=>{

html += `
<div>
<input type="radio" name="answer" value="${i}">
${opt}
</div>
`;

});


document.getElementById("quiz").innerHTML = html;

}



function nextQuestion(){

let selected =
document.querySelector('input[name="answer"]:checked');


if(!selected){

alert("Please select an answer");

return;

}


answers[current] = Number(selected.value);


current++;


if(current < questions.length){

loadQuestion();

}

else{

finishTest();

}

}




function finishTest(){

let score = 0;

let reviewHTML="<h2>Answer Review</h2>";


questions.forEach((q,index)=>{


if(answers[index] == q.answer){

score++;

reviewHTML += `
<p>
✅ Question ${index+1}: Correct
</p>
`;

}

else{

reviewHTML += `
<div style="border:1px solid #ccc; padding:15px; margin:15px 0;">

<h3>❌ Question ${index+1}</h3>

<p><b>${q.question}</b></p>

<p>
Your Answer:
<span style="color:red;">
${answers[index] !== undefined ? q.options[answers[index]] : "Not Attempted"}
</span>
</p>

<p>
Correct Answer:
<span style="color:green;">
${q.options[q.answer]}
</span>
</p>

<p>
<b>Explanation:</b><br>
${q.explanation}
</p>

</div>
`;

}


});


document.getElementById("quiz").innerHTML="Test Completed";

document.getElementById("score").innerHTML =
"Your Score: "+score+"/"+questions.length;


document.getElementById("review").innerHTML =
reviewHTML;


}


loadQuestion();


</script>


</body>

</html>
