<!DOCTYPE html>
<html>

<head>

<title>DAY-05 Polity IAS Practice</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>DAY-05 Polity MCQ Practice</h1>


<div id="quiz"></div>


<button onclick="nextQuestion()">Next</button>

<button onclick="finishTest()">Finish Test</button>


<h2 id="score"></h2>


<div id="review"></div>



<script src="day05_questions.js"></script>



<script>


let current = 0;
let answers = [];
let wrongQuestions = [];
let quizQuestions = day05_questions;



function loadQuestion(){


let q = quizQuestions[current];


let html =

"<h2>"+(current+1)+". "+q.question+"</h2>";



q.options.forEach((opt,i)=>{


html += `

<div>

<input type="radio" name="answer" value="${i}">

${opt}

</div>

`;


});



document.getElementById("quiz").innerHTML = html;


}




function nextQuestion(){


let selected =
document.querySelector('input[name="answer"]:checked');



if(!selected){

alert("Please select an answer");

return;

}



answers[current] = Number(selected.value);



current++;



if(current < quizQuestions.length){

loadQuestion();

}

else{

finishTest();
  function retryWrongQuestions(){

if(wrongQuestions.length==0){

alert("Excellent! No wrong questions.");

return;

}

quizQuestions = wrongQuestions;

current = 0;

answers = [];

wrongQuestions = [];

document.getElementById("score").innerHTML="";

document.getElementById("review").innerHTML="";

loadQuestion();

}

}



}





function finishTest(){

let score = 0;

let reviewHTML = "<h2>Answer Review</h2>";

quizQuestions.forEach((q,index)=>{

    if(answers[index] == q.answer){

        score++;

        reviewHTML += `
        <p>✅ Question ${index+1}: Correct</p>
        `;

    }

    else{

        wrongQuestions.push(q);

        reviewHTML += `

        <div style="border:1px solid #ccc;padding:15px;margin:15px 0;">

        <h3>❌ Question ${index+1}</h3>

        <p><b>${q.question}</b></p>

        <p>
        <b>Your Answer:</b>
        <span style="color:red;">
        ${answers[index] !== undefined ? q.options[answers[index]] : "Not Attempted"}
        </span>
        </p>

        <p>
        <b>Correct Answer:</b>
        <span style="color:green;">
        ${q.options[q.answer]}
        </span>
        </p>

        <p>
        <b>Explanation:</b><br>
        ${q.explanation}
        </p>

        </div>

        `;
    }

});

document.getElementById("quiz").innerHTML="Test Completed";

document.getElementById("score").innerHTML =
"Your Score: "+score+"/"+quizQuestions.length;

document.getElementById("review").innerHTML = reviewHTML;

if(wrongQuestions.length>0){

document.getElementById("review").innerHTML += `

<br><br>

<button onclick="retryWrongQuestions()">

Practice Wrong Questions Again

</button>

`;

}

}


loadQuestion();


</script>


</body>

</html>
